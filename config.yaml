# ViralSlop local YouTube Shorts generator configuration.

ollama_model: deepseek-r1:8b
ollama_base_url: http://localhost:11434
ollama_timeout_seconds: 240
ollama_json_mode: true
ollama_num_predict: 6000

video_duration_target: 180
output_resolution: [1080, 1920]
fps: 30
font_size: 68
font_path:
text_margin: 90
style_preset: solution_slides
reveal_mode: slide
max_reveal_words: 42
question_hold_seconds: 0.0
thinking_gap_seconds: 0.0
answer_hold_seconds: 2.0
caption_pause_seconds: 0.35
render_latex: true
low_res_preview: false
min_solution_steps: 8
max_solution_steps:

tts_engine: pyttsx3
tts_voice:
tts_rate: 175
piper_binary: piper
piper_model_path:

output_folder: output
skip_difficult: false
